<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnLab Search (XSS)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Search (Reflected XSS)</h1>
      <a class="btn btn-outline-secondary btn-sm" href="/">Home</a>
    </div>

    <div class="card">
      <div class="card-body">
        <form method="get" action="/search" class="row g-2">
          <div class="col-md-10">
            <input class="form-control" name="q" placeholder="Try: <script>alert(1)</script>" />
          </div>
          <div class="col-md-2 d-grid">
            <button class="btn btn-primary" type="submit">Search</button>
          </div>
        </form>

        <hr />
        <p class="mb-1 text-muted small">Output (intentionally unsanitized):</p>

        <!-- INTENTIONALLY VULNERABLE: do not sanitize -->
        <div class="p-3 border rounded bg-white">
          You searched for:
          <span class="fw-semibold">{{ q | safe }}</span>
        </div>
      </div>
    </div>

    <p class="text-muted mt-3 small mb-0">
      Example: <code>/search?q=&lt;script&gt;alert(1)&lt;/script&gt;</code>
    </p>
  </div>
</body>
</html>
