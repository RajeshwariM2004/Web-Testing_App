<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnLab Login (SQLi)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Login (SQL Injection)</h1>
      <a class="btn btn-outline-secondary btn-sm" href="/">Home</a>
    </div>

    {% if message %}
      <div class="alert {{ 'alert-success' if ok_user else 'alert-warning' }}">{{ message }}</div>
    {% endif %}

    <div class="card">
      <div class="card-body">
        <form method="post" action="/login" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" placeholder="admin" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" placeholder="admin123" />
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Login</button>
          </div>
        </form>

        <hr />
        <p class="text-muted small mb-1">Test credentials (normal login):</p>
        <ul class="text-muted small mb-0">
          <li><code>admin</code> / <code>admin123</code></li>
          <li><code>user</code> / <code>password</code></li>
        </ul>

        <p class="text-muted small mt-3 mb-1">SQLi payload example:</p>
        <pre class="mb-0"><code>' OR '1'='1</code></pre>
      </div>
    </div>
  </div>
</body>
</html>
